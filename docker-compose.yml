services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - dev_network

  api:
    build: ./backend
    ports:
      - "5003:8080"
    depends_on:
      - rabbitmq
    networks:
      - dev_network

  web:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - dev_network

networks:
  dev_network:
    driver: bridge